<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WoodWorks{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo">WOODWORKS</div>
        <nav>
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Create Account</a>
        </nav>
    </div>
</header>

{% block content %}{% endblock %}

<footer class="footer">
    <p>&copy; 2026 WoodWorks. All Rights Reserved.</p>
</footer>

</body>
</html>
